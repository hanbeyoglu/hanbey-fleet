version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hanbey-fleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hanbey
      POSTGRES_PASSWORD: hanbey123
      POSTGRES_DB: hanbey_fleet
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hanbey-fleet-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  adminer:
    image: adminer
    container_name: hanbey-fleet-adminer
    restart: unless-stopped
    ports:
      - '8081:8080'

volumes:
  postgres_data:
  redis_data:
